<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Kleinkunst Dashboard 2.0</title>
<style>
:root {
  --bg: #FAF7F2;
  --card: #FFFFFF;
  --card-soft: #FDFBF7;
  --hover: #F1EBE2;
  --text: #2A2226;
  --text-2: #6B5F63;
  --muted: #9A8E92;
  --accent: #7A2E3E;
  --accent-hover: #632532;
  --accent-soft: #F6E9EC;
  --gold: #C9962E;
  --gold-soft: #FBF3E1;
  --green: #2E7D51;
  --green-soft: #E5F3EB;
  --red: #C03B2E;
  --red-soft: #FBE9E7;
  --amber: #B07818;
  --amber-soft: #FCF3DF;
  --blue: #2F5D8A;
  --blue-soft: #E8F0F8;
  --border: #E7DFD4;
  --radius: 12px;
  --radius-sm: 8px;
  --shadow: 0 1px 3px rgba(42,34,38,0.07), 0 4px 14px rgba(42,34,38,0.05);
  --shadow-lg: 0 8px 40px rgba(42,34,38,0.18);
  --transition: 0.15s ease;
  --sidebar-w: 232px;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg); color: var(--text);
  font-size: 15px; line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}
#app { width: 100%; min-height: 100vh; }
button { font-family: inherit; }
input, select, textarea {
  font-family: inherit; font-size: 15px; color: var(--text);
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 10px 12px; width: 100%;
  transition: border-color var(--transition), box-shadow var(--transition);
}
input:focus, select:focus, textarea:focus {
  outline: none; border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-soft);
}
label { font-size: 13px; font-weight: 600; color: var(--text-2); display: block; margin-bottom: 5px; }
::placeholder { color: var(--muted); }

/* ===== Layout ===== */
.layout { display: flex; min-height: 100vh; }
.sidebar {
  width: var(--sidebar-w); flex-shrink: 0; position: sticky; top: 0; height: 100vh;
  background: linear-gradient(175deg, #35141D 0%, #2A1017 100%);
  color: #EFE4E7; display: flex; flex-direction: column; padding: 18px 12px;
  overflow-y: auto;
}
.brand { display: flex; align-items: center; gap: 10px; padding: 6px 10px 18px; }
.brand-logo {
  width: 38px; height: 38px; border-radius: 10px; flex-shrink: 0;
  background: linear-gradient(135deg, var(--gold) 0%, #E0B65C 100%);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
}
.brand-name { font-weight: 700; font-size: 15px; line-height: 1.2; }
.brand-sub { font-size: 11px; color: #C9A9B1; }
.nav-section { font-size: 10px; text-transform: uppercase; letter-spacing: 0.09em; color: #A87E89; padding: 14px 12px 6px; font-weight: 700; }
.nav-item {
  display: flex; align-items: center; gap: 11px; width: 100%;
  padding: 10px 12px; min-height: 42px; border: none; background: transparent;
  color: #DCC7CD; font-size: 14.5px; font-weight: 500; border-radius: 9px;
  cursor: pointer; text-align: left; transition: background var(--transition), color var(--transition);
}
.nav-item:hover { background: rgba(255,255,255,0.07); color: #fff; }
.nav-item.active { background: rgba(201,150,46,0.18); color: #F2D69A; }
.nav-item .ico { width: 21px; text-align: center; font-size: 16px; flex-shrink: 0; }
.nav-badge {
  margin-left: auto; background: var(--red); color: #fff; font-size: 11px;
  font-weight: 700; border-radius: 99px; padding: 1px 7px; min-width: 20px; text-align: center;
}
.sidebar-foot { margin-top: auto; padding: 12px; font-size: 11px; color: #A87E89; }

.main { flex: 1; min-width: 0; display: flex; flex-direction: column; }
.topbar {
  position: sticky; top: 0; z-index: 40;
  display: flex; align-items: center; gap: 12px;
  padding: 12px 24px; background: rgba(250,247,242,0.92);
  backdrop-filter: blur(8px); border-bottom: 1px solid var(--border);
}
.topbar h1 { font-size: 19px; margin: 0; font-weight: 700; flex-shrink: 0; }
.search-wrap { position: relative; flex: 1; max-width: 420px; margin-left: auto; }
.search-wrap input { padding-left: 36px; background: var(--card); }
.search-ico { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }
.search-results {
  position: absolute; top: calc(100% + 6px); left: 0; right: 0; z-index: 60;
  background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
  box-shadow: var(--shadow-lg); overflow: hidden; max-height: 340px; overflow-y: auto;
}
.search-result {
  display: flex; align-items: center; gap: 10px; width: 100%; text-align: left;
  padding: 11px 14px; border: none; background: none; cursor: pointer; font-size: 14px;
  border-bottom: 1px solid var(--border);
}
.search-result:last-child { border-bottom: none; }
.search-result:hover { background: var(--hover); }
.search-result .sr-type { font-size: 11px; color: var(--muted); margin-left: auto; flex-shrink: 0; }

.content { padding: 22px 24px 90px; max-width: 1280px; width: 100%; margin: 0 auto; }

/* ===== Buttons ===== */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 7px;
  padding: 10px 16px; min-height: 42px; border-radius: var(--radius-sm);
  border: 1px solid var(--border); background: var(--card); color: var(--text);
  font-size: 14px; font-weight: 600; cursor: pointer;
  transition: background var(--transition), border-color var(--transition), transform 0.05s;
}
.btn:hover { background: var(--hover); }
.btn:active { transform: scale(0.98); }
.btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent-hover); }
.btn-gold { background: var(--gold); border-color: var(--gold); color: #fff; }
.btn-danger { color: var(--red); border-color: #EBC5C0; }
.btn-danger:hover { background: var(--red-soft); }
.btn-sm { padding: 6px 11px; min-height: 34px; font-size: 13px; }
.btn-icon { padding: 8px; min-width: 42px; }
.fab {
  display: none; position: fixed; right: 18px; bottom: 84px; z-index: 45;
  width: 56px; height: 56px; border-radius: 50%; border: none;
  background: var(--accent); color: #fff; font-size: 26px; cursor: pointer;
  box-shadow: var(--shadow-lg); align-items: center; justify-content: center;
}

/* ===== Cards / KPIs ===== */
.card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); }
.card-pad { padding: 18px 20px; }
.card h3 { margin: 0 0 4px; font-size: 16px; }
.card .card-sub { font-size: 13px; color: var(--text-2); margin: 0 0 12px; }
.grid { display: grid; gap: 16px; }
.kpi-grid { grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); }
.kpi { padding: 16px 18px; cursor: pointer; transition: transform 0.1s, box-shadow var(--transition); }
.kpi:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
.kpi .kpi-label { font-size: 12.5px; font-weight: 600; color: var(--text-2); display: flex; align-items: center; gap: 6px; }
.kpi .kpi-value { font-size: 26px; font-weight: 800; margin-top: 4px; letter-spacing: -0.02em; }
.kpi .kpi-hint { font-size: 12px; color: var(--muted); margin-top: 2px; }
.two-col { grid-template-columns: 1fr 1fr; align-items: start; }

/* ===== Badges / Status ===== */
.badge {
  display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px;
  border-radius: 99px; font-size: 12px; font-weight: 700; white-space: nowrap;
}
.b-draft { background: #EFEAE3; color: #7A6E63; }
.b-planned { background: var(--blue-soft); color: var(--blue); }
.b-published { background: var(--green-soft); color: var(--green); }
.b-completed { background: var(--gold-soft); color: var(--amber); }
.b-cancelled { background: var(--red-soft); color: var(--red); }
.dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
.ampel-red { background: var(--red); }
.ampel-amber { background: var(--amber); }
.ampel-green { background: var(--green); }
.ampel-grey { background: #C6BCB0; }

/* ===== Lists / Tables ===== */
.list-item {
  display: flex; align-items: center; gap: 12px; padding: 13px 16px;
  border-bottom: 1px solid var(--border); cursor: pointer; min-height: 52px;
  transition: background var(--transition); background: var(--card);
}
.list-item:hover { background: var(--card-soft); }
.list-item:last-child { border-bottom: none; }
.li-main { min-width: 0; flex: 1; }
.li-title { font-weight: 650; font-size: 14.5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.li-sub { font-size: 12.5px; color: var(--text-2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.li-right { text-align: right; flex-shrink: 0; }
.date-chip {
  flex-shrink: 0; width: 48px; text-align: center; background: var(--card-soft);
  border: 1px solid var(--border); border-radius: 10px; padding: 5px 2px; line-height: 1.15;
}
.date-chip .d { font-size: 17px; font-weight: 800; }
.date-chip .m { font-size: 10.5px; text-transform: uppercase; color: var(--accent); font-weight: 700; }
.progress { height: 7px; background: var(--hover); border-radius: 99px; overflow: hidden; }
.progress > div { height: 100%; border-radius: 99px; background: var(--accent); transition: width 0.3s; }
.empty {
  text-align: center; padding: 40px 20px; color: var(--text-2);
}
.empty .big { font-size: 36px; margin-bottom: 8px; }

/* ===== Filter bar ===== */
.filter-bar { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 16px; align-items: center; }
.filter-bar select, .filter-bar input { width: auto; min-width: 140px; }
.filter-bar .spacer { flex: 1; }
.chip-row { display: flex; flex-wrap: wrap; gap: 8px; }
.chip {
  padding: 7px 13px; border-radius: 99px; border: 1px solid var(--border);
  background: var(--card); font-size: 13px; font-weight: 600; cursor: pointer; min-height: 36px;
}
.chip.on { background: var(--accent); color: #fff; border-color: var(--accent); }

/* ===== Kalender ===== */
.cal-head { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
.cal-title { font-size: 18px; font-weight: 800; min-width: 170px; text-align: center; }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
.cal-dow { text-align: center; font-size: 11.5px; font-weight: 700; color: var(--muted); text-transform: uppercase; padding: 4px 0; }
.cal-cell {
  min-height: 96px; background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 6px; cursor: pointer; position: relative;
  transition: border-color var(--transition);
}
.cal-cell:hover { border-color: var(--accent); }
.cal-cell.other { opacity: 0.45; }
.cal-cell.today { border-color: var(--gold); box-shadow: 0 0 0 2px var(--gold-soft); }
.cal-daynum { font-size: 12.5px; font-weight: 700; color: var(--text-2); }
.cal-cell.today .cal-daynum { color: var(--amber); }
.cal-ev {
  display: block; width: 100%; text-align: left; border: none; cursor: pointer;
  font-size: 11px; font-weight: 650; color: #fff; padding: 3px 6px;
  border-radius: 5px; margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.cal-conflict { position: absolute; top: 5px; right: 6px; font-size: 13px; }
.legend { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 14px; font-size: 12.5px; color: var(--text-2); }
.legend span { display: inline-flex; align-items: center; gap: 6px; }

/* ===== Modal / Drawer ===== */
.overlay {
  position: fixed; inset: 0; background: rgba(42,34,38,0.45); z-index: 90;
  display: flex; align-items: center; justify-content: center; padding: 20px;
  animation: fadeIn 0.15s ease;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { transform: translateY(24px); opacity: 0; } to { transform: none; opacity: 1; } }
.modal {
  background: var(--card); border-radius: 16px; box-shadow: var(--shadow-lg);
  width: 100%; max-width: 640px; max-height: calc(100vh - 40px);
  display: flex; flex-direction: column; animation: slideUp 0.18s ease;
}
.modal.wide { max-width: 760px; }
.modal-head {
  display: flex; align-items: center; gap: 12px; padding: 16px 20px;
  border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.modal-head h2 { margin: 0; font-size: 18px; flex: 1; min-width: 0; }
.modal-body { padding: 18px 20px; overflow-y: auto; }
.modal-foot {
  display: flex; gap: 10px; padding: 14px 20px; border-top: 1px solid var(--border);
  flex-shrink: 0; flex-wrap: wrap;
}
.modal-foot .spacer { flex: 1; }
.x-btn {
  border: none; background: var(--hover); color: var(--text-2); width: 36px; height: 36px;
  border-radius: 50%; font-size: 16px; cursor: pointer; flex-shrink: 0;
}
.x-btn:hover { background: var(--border); }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.form-grid .full { grid-column: 1 / -1; }
.warn-box {
  background: var(--amber-soft); border: 1px solid #EBD8A8; color: var(--amber);
  border-radius: var(--radius-sm); padding: 10px 14px; font-size: 13.5px; font-weight: 600;
}
.info-box {
  background: var(--blue-soft); border: 1px solid #C6D9EB; color: var(--blue);
  border-radius: var(--radius-sm); padding: 10px 14px; font-size: 13.5px;
}

/* ===== Checkbox / Tasks ===== */
.task-row { display: flex; align-items: flex-start; gap: 11px; padding: 11px 4px; border-bottom: 1px solid var(--border); }
.task-row:last-child { border-bottom: none; }
.task-check {
  width: 24px; height: 24px; min-height: 24px; border-radius: 7px; border: 2px solid var(--border);
  background: var(--card); cursor: pointer; flex-shrink: 0; margin-top: 1px;
  display: flex; align-items: center; justify-content: center; font-size: 14px; color: #fff; padding: 0;
}
.task-check.done { background: var(--green); border-color: var(--green); }
.task-title { font-size: 14.5px; font-weight: 550; }
.task-title.done { text-decoration: line-through; color: var(--muted); }
.task-meta { font-size: 12px; color: var(--text-2); display: flex; flex-wrap: wrap; gap: 8px; margin-top: 2px; }
.cat-tag { font-size: 11px; font-weight: 700; padding: 1px 8px; border-radius: 99px; }

/* ===== Toast ===== */
.toasts { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 200; display: flex; flex-direction: column; gap: 8px; align-items: center; }
.toast {
  background: #35262C; color: #fff; padding: 11px 20px; border-radius: 99px;
  font-size: 14px; font-weight: 600; box-shadow: var(--shadow-lg);
  animation: slideUp 0.2s ease; max-width: 90vw;
}
.toast.success { background: var(--green); }
.toast.error { background: var(--red); }

/* ===== Detail sections ===== */
.detail-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin: 14px 0; }
.detail-stat { background: var(--card-soft); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 12px; }
.detail-stat .l { font-size: 11.5px; color: var(--text-2); font-weight: 600; }
.detail-stat .v { font-size: 17px; font-weight: 800; margin-top: 1px; }
.section-title { font-size: 13px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-2); margin: 20px 0 8px; }
.artist-chips { display: flex; flex-wrap: wrap; gap: 8px; }
.artist-chip {
  display: inline-flex; align-items: center; gap: 7px; background: var(--accent-soft);
  color: var(--accent); font-weight: 650; font-size: 13px; padding: 6px 12px; border-radius: 99px;
}

/* ===== Table ===== */
.table-wrap { overflow-x: auto; }
table.tbl { width: 100%; border-collapse: collapse; font-size: 14px; }
.tbl th { text-align: left; font-size: 12px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--muted); padding: 10px 12px; border-bottom: 2px solid var(--border); white-space: nowrap; }
.tbl td { padding: 11px 12px; border-bottom: 1px solid var(--border); }
.tbl tr:last-child td { border-bottom: none; }
.tbl .num { text-align: right; font-variant-numeric: tabular-nums; white-space: nowrap; }
.pos { color: var(--green); font-weight: 700; }
.neg { color: var(--red); font-weight: 700; }

/* ===== Bottom nav (mobile) ===== */
.bottomnav {
  display: none; position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
  background: rgba(255,255,255,0.96); backdrop-filter: blur(10px);
  border-top: 1px solid var(--border);
  padding: 4px 4px calc(4px + env(safe-area-inset-bottom));
}
.bottomnav-inner { display: flex; }
.bn-item {
  flex: 1; display: flex; flex-direction: column; align-items: center; gap: 1px;
  border: none; background: none; padding: 7px 2px; min-height: 52px;
  font-size: 10.5px; font-weight: 650; color: var(--text-2); cursor: pointer; border-radius: 10px;
  position: relative;
}
.bn-item .ico { font-size: 20px; }
.bn-item.active { color: var(--accent); }
.bn-dot { position: absolute; top: 5px; right: calc(50% - 16px); width: 8px; height: 8px; border-radius: 50%; background: var(--red); }

@media (max-width: 900px) {
  .sidebar { display: none; }
  .hide-mobile { display: none; }
  .bottomnav { display: block; }
  .fab { display: flex; }
  .topbar { padding: 10px 14px; }
  .content { padding: 16px 14px 110px; }
  .two-col { grid-template-columns: 1fr; }
  .form-grid { grid-template-columns: 1fr; }
  .cal-cell { min-height: 64px; padding: 4px; }
  .cal-ev { font-size: 9px; padding: 2px 4px; }
  .overlay { padding: 0; align-items: flex-end; }
  .modal { max-width: 100%; max-height: 94vh; border-radius: 16px 16px 0 0; }
  .topbar h1 { font-size: 17px; }
  .kpi .kpi-value { font-size: 22px; }
}
@media (max-width: 480px) {
  .kpi-grid { grid-template-columns: 1fr 1fr; }
  .filter-bar select, .filter-bar input { min-width: 110px; flex: 1; }
}
</style>

/* ===== Hilfsfunktionen ===== */
const uid = (p) => p + '-' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
const EUR = new Intl.NumberFormat('de-DE', { style: 'currency', currency: 'EUR', maximumFractionDigits: 0 });
const fmtEUR = (n) => EUR.format(n || 0);
const todayISO = () => {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
};
const fmtDate = (iso) => {
  if (!iso) return '—';
  const [y, m, d] = iso.split('-').map(Number);
  return String(d).padStart(2, '0') + '.' + String(m).padStart(2, '0') + '.' + y;
};
const fmtDateShort = (iso) => {
  if (!iso) return '—';
  const [y, m, d] = iso.split('-').map(Number);
  const dt = new Date(y, m - 1, d);
  return ['So','Mo','Di','Mi','Do','Fr','Sa'][dt.getDay()] + ', ' + String(d).padStart(2, '0') + '. ' + MONTHS[m - 1].slice(0, 3) + '.';
};
const daysUntil = (iso) => {
  if (!iso) return null;
  const [y, m, d] = iso.split('-').map(Number);
  const target = new Date(y, m - 1, d);
  const now = new Date(); now.setHours(0, 0, 0, 0);
  return Math.round((target - now) / 86400000);
};
const addDays = (iso, delta) => {
  const [y, m, d] = iso.split('-').map(Number);
  const dt = new Date(y, m - 1, d + delta);
  return dt.getFullYear() + '-' + String(dt.getMonth() + 1).padStart(2, '0') + '-' + String(dt.getDate()).padStart(2, '0');
};
const timeToMin = (t) => {
  if (!t) return 0;
  const [hh, mm] = t.split(':').map(Number);
  return hh * 60 + (mm || 0);
};
/* Doppelbelegung: gleicher Ort, gleicher Tag, Zeiten überlappen (inkl. 30 Min Puffer) */
function findConflicts(event, allEvents) {
  if (!event.venueId || !event.date) return [];
  const buffer = 30;
  return allEvents.filter((other) => {
    if (other.id === event.id) return false;
    if (other.venueId !== event.venueId || other.date !== event.date) return false;
    if (other.status === 'cancelled' || event.status === 'cancelled') return false;
    const aStart = timeToMin(event.startTime) - buffer;
    const aEnd = timeToMin(event.endTime || event.startTime) + buffer;
    const bStart = timeToMin(other.startTime);
    const bEnd = timeToMin(other.endTime || other.startTime);
    return aStart < bEnd && bStart < aEnd;
  });
}
/* GEMA-Ampel: rot = überfällig, gelb = fällig in <= 7 Tagen, grün = ok */
function gemaAmpel(event) {
  if (event.gemaStatus === 'confirmed') return 'green';
  if (event.gemaStatus === 'not_required') return 'grey';
  if (event.gemaStatus === 'problem') return 'red';
  const days = daysUntil(event.gemaDueDate);
  if (days === null) return 'grey';
  if (days < 0) return 'red';
  if (days <= 7) return 'amber';
  return 'green';
}

/* ===== Toast-Hook ===== */
function useToast() {
  const [toasts, setToasts] = useState([]);
  const show = useCallback((message, type = 'success') => {
    const id = Date.now() + Math.random();
    setToasts((prev) => [...prev, { id, message, type }]);
    setTimeout(() => setToasts((prev) => prev.filter((t) => t.id !== id)), 2800);
  }, []);
  return { toasts, show };
}
function Toasts({ toasts }) {
  return html`<div class="toasts" role="status" aria-live="polite">
    ${toasts.map((t) => html`<div key=${t.id} class="toast ${t.type}">${t.message}</div>`)}
  </div>`;
}

/* ===== Basis-Komponenten ===== */
function Modal({ title, onClose, children, footer, wide }) {
  useEffect(() => {
    const onKey = (e) => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [onClose]);
  return html`<div class="overlay" onClick=${(e) => { if (e.target === e.currentTarget) onClose(); }}>
    <div class="modal ${wide ? 'wide' : ''}" role="dialog" aria-modal="true" aria-label=${title}>
      <div class="modal-head">
        <h2>${title}</h2>
        <button class="x-btn" onClick=${onClose} aria-label="Schließen">✕</button>
      </div>
      <div class="modal-body">${children}</div>
      ${footer ? html`<div class="modal-foot">${footer}</div>` : null}
    </div>
  </div>`;
}

function StatusBadge({ status }) {
  const s = STATUS[status] || STATUS.draft;

/* ===== Ansicht: Übersicht (Dashboard) ===== */
function DashboardView({ data, openEvent, go, onNewEvent }) {
  const today = todayISO();
  const upcoming = data.events
    .filter((e) => e.date >= today && e.status !== 'cancelled')
    .sort((a, b) => (a.date + a.startTime).localeCompare(b.date + b.startTime));
  const next30 = upcoming.filter((e) => (daysUntil(e.date) ?? 99) <= 30);
  const soldTotal = next30.reduce((s, e) => s + (e.soldTickets || 0), 0);
  const capTotal = next30.reduce((s, e) => s + (e.capacity || 0), 0);
  const month = today.slice(0, 7);
  const monthEvents = data.events.filter((e) => e.date.slice(0, 7) === month && e.status !== 'cancelled');
  const monthRevenue = monthEvents.reduce((s, e) => s + (e.revenueActual || 0), 0);
  const monthProfit = monthEvents.reduce((s, e) => s + (e.revenueActual || 0) - (e.costs || 0), 0);
  const openTasks = data.tasks.filter((t) => !t.completed).sort((a, b) => (a.dueDate || '9999').localeCompare(b.dueDate || '9999'));
  const overdueTasks = openTasks.filter((t) => t.dueDate && t.dueDate < today);
  const gemaCritical = data.events
    .filter((e) => ['red', 'amber'].includes(gemaAmpel(e)))
    .sort((a, b) => (a.gemaDueDate || '9999').localeCompare(b.gemaDueDate || '9999'));

  return html`<div class="grid" style="gap:18px;">
    <div class="grid kpi-grid">
      <div class="card kpi" onClick=${() => go('events')}>
        <div class="kpi-label">🎭 Events (30 Tage)</div>
        <div class="kpi-value">${next30.length}</div>
        <div class="kpi-hint">${upcoming.length} insgesamt geplant</div>
      </div>
      <div class="card kpi" onClick=${() => go('events')}>
        <div class="kpi-label">🎟️ Tickets verkauft</div>
        <div class="kpi-value">${soldTotal}</div>
        <div class="kpi-hint">${capTotal > 0 ? Math.round((soldTotal / capTotal) * 100) + '% Auslastung' : 'keine Events'}</div>
      </div>
      <div class="card kpi" onClick=${() => go('finance')}>
        <div class="kpi-label">💶 Umsatz ${MONTHS[Number(month.slice(5)) - 1]}</div>
        <div class="kpi-value">${fmtEUR(monthRevenue)}</div>
        <div class="kpi-hint">Ergebnis: <span class=${monthProfit >= 0 ? 'pos' : 'neg'}>${fmtEUR(monthProfit)}</span></div>
      </div>
      <div class="card kpi" onClick=${() => go('tasks')}>
        <div class="kpi-label">✅ Offene Aufgaben</div>
        <div class="kpi-value">${openTasks.length}</div>
        <div class="kpi-hint" style=${overdueTasks.length ? 'color:var(--red);font-weight:700;' : ''}>${overdueTasks.length} überfällig</div>
      </div>
      <div class="card kpi" onClick=${() => go('gema')}>
        <div class="kpi-label">📄 GEMA-Fristen</div>
        <div class="kpi-value">${gemaCritical.length}</div>
        <div class="kpi-hint">brauchen Aufmerksamkeit</div>
      </div>
    </div>

    <div class="grid two-col">
      <div class="card">
        <div class="card-pad" style="padding-bottom:8px;display:flex;align-items:center;">
          <h3 style="flex:1;">Nächste Veranstaltungen</h3>
          <button class="btn btn-sm btn-primary" onClick=${onNewEvent}>+ Neu</button>
        </div>
        ${upcoming.length === 0 ? html`<${Empty} icon="🎭" text="Keine anstehenden Veranstaltungen" hint="Lege mit „+ Neu“ die erste an." />` : null}
        ${upcoming.slice(0, 6).map((e) => {
          const venue = data.venues.find((v) => v.id === e.venueId);
          const [, m, d] = e.date.split('-');
          return html`<div key=${e.id} class="list-item" onClick=${() => openEvent(e.id)}>
            <div class="date-chip"><div class="d">${Number(d)}</div><div class="m">${MONTHS[Number(m) - 1].slice(0, 3)}</div></div>
            <div class="li-main">
              <div class="li-title">${e.title}</div>
              <div class="li-sub">${e.startTime} Uhr · ${venue ? venue.name : '—'}</div>
            </div>
            <div class="li-right"><${StatusBadge} status=${e.status} /></div>
          </div>`;
        })}
      </div>

      <div class="grid" style="gap:18px;">
        <div class="card">
          <div class="card-pad" style="padding-bottom:8px;"><h3>Dringende Aufgaben</h3></div>
          ${openTasks.length === 0 ? html`<${Empty} icon="🎉" text="Alles erledigt!" />` : null}

            const ev = data.events.find((e) => e.id === t.eventId);
            return html`<div key=${t.id} class="list-item" onClick=${() => go('tasks')}>
              <span class="dot ${overdue ? 'ampel-red' : 'ampel-amber'}"></span>

/* ===== Ansicht: Kalender ===== */
function CalendarView({ data, openEvent, onNewEventAt }) {
  const now = new Date();
  const [ym, setYm] = useState([now.getFullYear(), now.getMonth()]);
  const [year, monthIdx] = ym;
  const today = todayISO();
  const firstDow = (new Date(year, monthIdx, 1).getDay() + 6) % 7; // Mo = 0
  const daysInMonth = new Date(year, monthIdx + 1, 0).getDate();
  const cells = [];
  const prevMonthDays = new Date(year, monthIdx, 0).getDate();
  for (let i = firstDow - 1; i >= 0; i--) cells.push({ day: prevMonthDays - i, other: true, iso: null });
  for (let d = 1; d <= daysInMonth; d++) {
    const iso = year + '-' + String(monthIdx + 1).padStart(2, '0') + '-' + String(d).padStart(2, '0');
    cells.push({ day: d, other: false, iso });
  }
  let nextDay = 1;
  while (cells.length % 7 !== 0) cells.push({ day: nextDay++, other: true, iso: null });
  const eventsByDay = useMemo(() => {
    const map = {};
    for (const e of data.events) {
      if (!map[e.date]) map[e.date] = [];
      map[e.date].push(e);
    }
    for (const k in map) map[k].sort((a, b) => a.startTime.localeCompare(b.startTime));
    return map;
  }, [data.events]);
  const activeVenues = data.venues.filter((v) => data.events.some((e) => e.date.slice(0, 7) === (year + '-' + String(monthIdx + 1).padStart(2, '0')) && e.venueId === v.id));

  return html`<div>
    <div class="cal-head">
      <button class="btn btn-icon" onClick=${() => setYm(([y, m]) => m === 0 ? [y - 1, 11] : [y, m - 1])} aria-label="Voriger Monat">‹</button>
      <div class="cal-title">${MONTHS[monthIdx]} ${year}</div>
      <button class="btn btn-icon" onClick=${() => setYm(([y, m]) => m === 11 ? [y + 1, 0] : [y, m + 1])} aria-label="Nächster Monat">›</button>
      <button class="btn btn-sm" onClick=${() => setYm([now.getFullYear(), now.getMonth()])}>Heute</button>
      <span class="spacer" style="flex:1;"></span>
      <span style="font-size:12.5px;color:var(--muted);">Tag antippen = neue Veranstaltung</span>
    </div>
    <div class="cal-grid">
      ${DOW.map((d) => html`<div key=${d} class="cal-dow">${d}</div>`)}
      ${cells.map((c, i) => html`
        <div key=${i} class="cal-cell ${c.other ? 'other' : ''} ${c.iso === today ? 'today' : ''}"
          onClick=${() => { if (c.iso) onNewEventAt(c.iso); }}>
          <div class="cal-daynum">${c.day}</div>
          ${(c.iso && eventsByDay[c.iso] || []).map((e) => {
            const venue = data.venues.find((v) => v.id === e.venueId);
            const hasConflict = findConflicts(e, data.events).length > 0;
            return html`<button key=${e.id} class="cal-ev" style="background:${venue ? venue.color : '#888'};${e.status === 'cancelled' ? 'opacity:0.45;text-decoration:line-through;' : ''}"
              onClick=${(ev) => { ev.stopPropagation(); openEvent(e.id); }}>${hasConflict ? '⚠️ ' : ''}${e.startTime} ${e.title}</button>`;
          })}
        </div>
      `)}
    </div>
    ${activeVenues.length > 0 ? html`<div class="legend">
      ${activeVenues.map((v) => html`<span key=${v.id}><span class="dot" style="background:${v.color};"></span>${v.name}</span>`)}
    </div>` : null}
  </div>`;
}

/* ===== Ansicht: Finanzen & GEMA ===== */
function FinanceView({ data, openEvent }) {
  const months = useMemo(() => {
    const set = new Set(data.events.map((e) => e.date.slice(0, 7)));
    return [...set].sort().reverse();
  }, [data.events]);
  const [month, setMonth] = useState(() => {
    const cur = todayISO().slice(0, 7);
    return months.includes(cur) ? cur : (months[0] || cur);
  });
  const events = data.events.filter((e) => e.date.slice(0, 7) === month && e.status !== 'cancelled')
    .sort((a, b) => a.date.localeCompare(b.date));
  const totalRev = events.reduce((s, e) => s + (e.revenueActual || 0), 0);
  const totalCost = events.reduce((s, e) => s + (e.costs || 0), 0);
  const profit = totalRev - totalCost;
  const byVenue = data.venues.map((v) => {
    const ve = events.filter((e) => e.venueId === v.id);
    return { venue: v, rev: ve.reduce((s, e) => s + (e.revenueActual || 0), 0), cost: ve.reduce((s, e) => s + (e.costs || 0), 0), count: ve.length };
  }).filter((x) => x.count > 0);

  return html`<div class="grid" style="gap:18px;">
    <div class="filter-bar">
      <label style="margin:0;" for="fin-month">Monat</label>
      <select id="fin-month" value=${month} onChange=${(e) => setMonth(e.target.value)}>
        ${(months.length ? months : [month]).map((m) => html`<option key=${m} value=${m}>${MONTHS[Number(m.slice(5)) - 1]} ${m.slice(0, 4)}</option>`)}
      </select>
    </div>
    <div class="grid kpi-grid">
      <div class="card kpi"><div class="kpi-label">💶 Einnahmen</div><div class="kpi-value">${fmtEUR(totalRev)}</div><div class="kpi-hint">${events.length} Events</div></div>
      <div class="card kpi"><div class="kpi-label">📉 Kosten</div><div class="kpi-value">${fmtEUR(totalCost)}</div></div>
      <div class="card kpi"><div class="kpi-label">📊 Ergebnis</div><div class="kpi-value ${profit >= 0 ? 'pos' : 'neg'}">${fmtEUR(profit)}</div></div>
    </div>
    <div class="card">
      <div class="card-pad" style="padding-bottom:0;"><h3>Events im ${MONTHS[Number(month.slice(5)) - 1]}</h3></div>
      <div class="table-wrap card-pad" style="padding-top:8px;">
        ${events.length === 0 ? html`<${Empty} icon="💶" text="Keine Events in diesem Monat" />` : html`
        <table class="tbl">
          <thead><tr><th>Event</th><th>Datum</th><th class="num">Tickets</th><th class="num">Einnahmen</th><th class="num">Kosten</th><th class="num">Ergebnis</th></tr></thead>
          <tbody>
            ${events.map((e) => {
              const p = (e.revenueActual || 0) - (e.costs || 0);
              return html`<tr key=${e.id} style="cursor:pointer;" onClick=${() => openEvent(e.id)}>
                <td style="font-weight:600;">${e.title}</td>
                <td>${fmtDate(e.date)}</td>
                <td class="num">${e.soldTickets}/${e.capacity}</td>
                <td class="num">${fmtEUR(e.revenueActual)}</td>
                <td class="num">${fmtEUR(e.costs)}</td>
                <td class="num ${p >= 0 ? 'pos' : 'neg'}">${fmtEUR(p)}</td>
              </tr>`;
            })}
          </tbody>
        </table>`}
      </div>
    </div>
    ${byVenue.length > 0 ? html`<div class="card card-pad">
      <h3>Nach Spielort</h3>
      <div class="table-wrap" style="margin-top:8px;">
        <table class="tbl">
          <thead><tr><th>Spielort</th><th class="num">Events</th><th class="num">Einnahmen</th><th class="num">Ergebnis</th></tr></thead>
          <tbody>
            ${byVenue.map((x) => html`<tr key=${x.venue.id}>
              <td><span class="dot" style="background:${x.venue.color};margin-right:8px;"></span>${x.venue.name}</td>
              <td class="num">${x.count}</td>
              <td class="num">${fmtEUR(x.rev)}</td>
              <td class="num ${x.rev - x.cost >= 0 ? 'pos' : 'neg'}">${fmtEUR(x.rev - x.cost)}</td>
            </tr>`)}
          </tbody>
        </table>
      </div>
    </div>` : null}
  </div>`;
}

/* ===== Ansicht: GEMA ===== */
function GemaView({ data, openEvent, onSetGemaStatus }) {
  const relevant = data.events
    .filter((e) => e.gemaStatus !== 'not_required')
    .sort((a, b) => {
      const order = { red: 0, amber: 1, green: 2, grey: 3 };
      return order[gemaAmpel(a)] - order[gemaAmpel(b)] || (a.gemaDueDate || '9999').localeCompare(b.gemaDueDate || '9999');
    });
  return html`<div class="grid" style="gap:18px;">
    <div class="info-box">GEMA-Ampel: <b style="color:var(--red);">Rot</b> = überfällig oder Problem, <b style="color:var(--amber);">Gelb</b> = Frist in den nächsten 7 Tagen, <b style="color:var(--green);">Grün</b> = im Plan. Status direkt hier umstellen.</div>
    <div class="card">
      ${relevant.length === 0 ? html`<${Empty} icon="📄" text="Keine GEMA-pflichtigen Events" />` : null}
      ${relevant.map((e) => {
        const days = daysUntil(e.gemaDueDate);
        return html`<div key=${e.id} class="list-item" style="cursor:default;">
          <span class="dot ampel-${gemaAmpel(e)}" style="width:12px;height:12px;"></span>
          <div class="li-main" style="cursor:pointer;" onClick=${() => openEvent(e.id)}>
            <div class="li-title">${e.title}</div>
            <div class="li-sub">
              ${fmtDateShort(e.date)}
              ${e.gemaDueDate ? ' · Frist ' + fmtDate(e.gemaDueDate) + (days !== null && e.gemaStatus !== 'confirmed' ? (days < 0 ? ' — ' + Math.abs(days) + ' Tage überfällig!' : ' — in ' + days + ' Tagen') : '') : ' · keine Frist gesetzt'}
            </div>
          </div>
          <select style="width:auto;" value=${e.gemaStatus} onChange=${(ev) => onSetGemaStatus(e.id, ev.target.value)} aria-label="GEMA-Status ändern">
            ${Object.keys(GEMA_STATUS).map((k) => html`<option key=${k} value=${k}>${GEMA_STATUS[k]}</option>`)}
          </select>
        </div>`;
      })}
    </div>
  </div>`;
}

/* ===== Ansicht: Aufgaben ===== */
function TasksView({ data, onToggleTask, onDeleteTask, onAddTask }) {
  const [filter, setFilter] = useState('open');
  const [catFilter, setCatFilter] = useState('all');
  const [newTitle, setNewTitle] = useState('');
  const [newEvent, setNewEvent] = useState('');
  const [newDue, setNewDue] = useState('');
  const today = todayISO();
  const filtered = data.tasks.filter((t) => {
    if (filter === 'open' && t.completed) return false;
    if (filter === 'done' && !t.completed) return false;
    if (catFilter !== 'all' && t.category !== catFilter) return false;
    return true;
  }).sort((a, b) => (a.completed - b.completed) || (a.dueDate || '9999').localeCompare(b.dueDate || '9999'));

  const add = () => {
    if (!newTitle.trim()) return;
    onAddTask(newEvent || null, newTitle.trim(), newDue || null, catFilter !== 'all' ? catFilter : 'general');
    setNewTitle(''); setNewDue('');
  };

  return html`<div class="grid" style="gap:16px;">
    <div class="card card-pad">
      <h3>Neue Aufgabe</h3>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;">
        <input style="flex:2;min-width:200px;" placeholder="Was ist zu tun?" value=${newTitle} onInput=${(e) => setNewTitle(e.target.value)}
          onKeyDown=${(e) => { if (e.key === 'Enter') add(); }} />
        <select style="flex:1;min-width:150px;width:auto;" value=${newEvent} onChange=${(e) => setNewEvent(e.target.value)}>
          <option value="">Ohne Event</option>
          ${data.events.filter((e) => e.date >= today).map((e) => html`<option key=${e.id} value=${e.id}>${e.title}</option>`)}
        </select>
        <input style="width:auto;" type="date" value=${newDue} onInput=${(e) => setNewDue(e.target.value)} aria-label="Fällig am" />
        <button class="btn btn-primary" onClick=${add}>Hinzufügen</button>
      </div>
    </div>
    <div class="filter-bar">
      <div class="chip-row">
        ${[['open', 'Offen'], ['done', 'Erledigt'], ['all', 'Alle']].map(([k, l]) => html`
          <button key=${k} class="chip ${filter === k ? 'on' : ''}" onClick=${() => setFilter(k)}>${l}</button>`)}
      </div>
      <span class="spacer"></span>
      <select style="width:auto;" value=${catFilter} onChange=${(e) => setCatFilter(e.target.value)}>
        <option value="all">Alle Kategorien</option>
        ${Object.keys(CATEGORIES).map((k) => html`<option key=${k} value=${k}>${CATEGORIES[k].label}</option>`)}
      </select>
    </div>
    <div class="card" style="padding:6px 16px;">
      ${filtered.length === 0 ? html`<${Empty} icon="✅" text="Keine Aufgaben in dieser Ansicht" />` : null}
      ${filtered.map((t) => {
        const ev = data.events.find((e) => e.id === t.eventId);
        const overdue = !t.completed && t.dueDate && t.dueDate < today;
        return html`<div key=${t.id} class="task-row">
          <button class="task-check ${t.completed ? 'done' : ''}" onClick=${() => onToggleTask(t.id)} aria-label="Erledigt umschalten">${t.completed ? '✓' : ''}</button>
          <div style="flex:1;min-width:0;">
            <div class="task-title ${t.completed ? 'done' : ''}">${t.title}</div>
            <div class="task-meta">
              <span class="cat-tag" style="background:${CATEGORIES[t.category].bg};color:${CATEGORIES[t.category].fg};">${CATEGORIES[t.category].label}</span>
              ${t.dueDate ? html`<span style=${overdue ? 'color:var(--red);font-weight:700;' : ''}>bis ${fmtDate(t.dueDate)}${overdue ? ' — überfällig' : ''}</span>` : null}
              ${ev ? html`<span>· ${ev.title}</span>` : null}
              ${t.assignee ? html`<span>· ${t.assignee}</span>` : null}
            </div>
          </div>
          <button class="x-btn" style="width:30px;height:30px;font-size:12px;" onClick=${() => onDeleteTask(t.id)} aria-label="Aufgabe löschen">✕</button>
        </div>`;
      })}
    </div>
  </div>`;
}

/* ===== Ansicht: Einstellungen ===== */
function SettingsView({ data, onImport, onResetDemo, onClearAll, toast }) {
  const fileRef = useRef(null);
  const doExport = () => {
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'kleinkunst-dashboard-backup-' + todayISO() + '.json';
    a.click();
    URL.revokeObjectURL(url);
    toast('Backup heruntergeladen.');
  };
  const doImport = (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const parsed = JSON.parse(reader.result);
        if (!parsed || !Array.isArray(parsed.events)) throw new Error('Format nicht erkannt');
        onImport(parsed);
      } catch (err) {
        toast('Import fehlgeschlagen: ' + err.message, 'error');
      }
    };
    reader.readAsText(file);
    e.target.value = '';
  };
  return html`<div class="grid" style="gap:18px;max-width:640px;">
    <div class="card card-pad">
      <h3>Datensicherung</h3>
      <p class="card-sub">Alle Daten liegen lokal in diesem Browser. Regelmäßig ein Backup herunterladen — besonders vor Browser-Wechsel oder Aufräum-Aktionen.</p>
      <div style="display:flex;gap:10px;flex-wrap:wrap;">
        <button class="btn btn-primary" onClick=${doExport}>⬇️ Backup herunterladen (JSON)</button>
        <button class="btn" onClick=${() => fileRef.current && fileRef.current.click()}>⬆️ Backup einspielen</button>
        <input ref=${fileRef} type="file" accept="application/json,.json" style="display:none;" onChange=${doImport} />
      </div>
    </div>
    <div class="card card-pad">
      <h3>Daten zurücksetzen</h3>
      <p class="card-sub">„Demo-Daten laden“ ersetzt alles durch die Beispieldaten. „Alles löschen“ startet mit einer leeren App.</p>
      <div style="display:flex;gap:10px;flex-wrap:wrap;">
        <button class="btn" onClick=${onResetDemo}>🔄 Demo-Daten laden</button>
        <button class="btn btn-danger" onClick=${onClearAll}>🗑️ Alles löschen</button>
      </div>
    </div>
    <div class="card card-pad">
      <h3>Über diese App</h3>
      <p class="card-sub" style="margin-bottom:0;">
        Kleinkunst Dashboard <b>Version ${APP_VERSION}</b> — Single-File-App, funktioniert offline, keine Anmeldung nötig.<br /><br />
        <b>Neu in 2.0:</b> Alles ist bearbeitbar und wird automatisch gespeichert · Kalender mit Konflikt-Warnung bei Doppelbelegung ·
        GEMA-Fristen-Ampel · Finanzübersicht mit Kosten und Ergebnis pro Event und Spielort · Checklisten mit Standard-Vorlage ·
        Globale Suche · Mobil optimiert mit Navigationsleiste unten · Backup als Datei.
      </p>
    </div>
  </div>`;
}

const NAV = [
  { id: 'dashboard', label: 'Übersicht', ico: '🏠' },
  { id: 'events', label: 'Veranstaltungen', ico: '🎭' },
  { id: 'calendar', label: 'Kalender', ico: '📅' },

  { id: 'settings', label: 'Einstellungen', ico: '⚙️' },
];
const TITLES = Object.fromEntries(NAV.map((n) => [n.id, n.label]));
const MOBILE_NAV = ['dashboard', 'events', 'calendar', 'tasks'];

/* ===== Haupt-App ===== */
function App() {
  const [data, setData] = useState(loadData);
  const [view, setView] = useState('dashboard');
  const [detailId, setDetailId] = useState(null);
  const [eventForm, setEventForm] = useState(null);   // null | {} | event
  const [venueForm, setVenueForm] = useState(null);
  const [artistForm, setArtistForm] = useState(null);
  const [confirmAction, setConfirmAction] = useState(null); // {message, onYes}
  const [query, setQuery] = useState('');
  const [moreOpen, setMoreOpen] = useState(false);
  const { toasts, show: toast } = useToast();

  useEffect(() => { saveData(data); }, [data]);

  const go = (v) => { setView(v); setQuery(''); setMoreOpen(false); window.scrollTo(0, 0); };
  const openEvent = (id) => setDetailId(id);
  const detailEvent = detailId ? data.events.find((e) => e.id === detailId) : null;

  /* --- Mutationen (immer funktionale Updates!) --- */
  const saveEvent = (form) => {
    if (form.id) {
      setData((prev) => ({ ...prev, events: prev.events.map((e) => e.id === form.id ? { ...e, ...form } : e) }));
      toast('Veranstaltung gespeichert.');
    } else {
      const newEvent = { ...form, id: uid('event') };
      setData((prev) => ({ ...prev, events: [...prev.events, newEvent] }));
      toast('Veranstaltung angelegt.');
      setDetailId(newEvent.id);
    }
    setEventForm(null);
  };
  const deleteEvent = (id) => {
    setConfirmAction({
      message: 'Diese Veranstaltung und ihre Aufgaben wirklich löschen?',
      onYes: () => {
        setData((prev) => ({
          ...prev,
          events: prev.events.filter((e) => e.id !== id),
          tasks: prev.tasks.filter((t) => t.eventId !== id),
        }));
        setDetailId(null);
        toast('Veranstaltung gelöscht.');
      },
    });
  };
  const saveVenue = (form) => {
    if (form.id) {
      setData((prev) => ({ ...prev, venues: prev.venues.map((v) => v.id === form.id ? { ...v, ...form } : v) }));
      toast('Spielort gespeichert.');
    } else {
      setData((prev) => ({ ...prev, venues: [...prev.venues, { ...form, id: uid('venue') }] }));
      toast('Spielort angelegt.');
    }
    setVenueForm(null);
  };
  const saveArtist = (form) => {
    if (form.id) {
      setData((prev) => ({ ...prev, artists: prev.artists.map((a) => a.id === form.id ? { ...a, ...form } : a) }));
      toast('Künstler gespeichert.');
    } else {
      setData((prev) => ({ ...prev, artists: [...prev.artists, { ...form, id: uid('artist') }] }));
      toast('Künstler angelegt.');
    }
    setArtistForm(null);
  };
  const toggleTask = (id) => setData((prev) => ({
    ...prev, tasks: prev.tasks.map((t) => t.id === id ? { ...t, completed: !t.completed } : t),
  }));
  const deleteTask = (id) => setData((prev) => ({ ...prev, tasks: prev.tasks.filter((t) => t.id !== id) }));
  const addTask = (eventId, title, dueDate = null, category = 'general') => {
    setData((prev) => ({ ...prev, tasks: [...prev.tasks, { id: uid('task'), title, dueDate, eventId, category, completed: false, assignee: '' }] }));
    toast('Aufgabe hinzugefügt.');
  };
  const applyTemplate = (event) => {
    const newTasks = TASK_TEMPLATE.map((tpl) => ({
      id: uid('task'),
      title: tpl.title,
      dueDate: addDays(event.date, -tpl.offsetDays),
      eventId: event.id,
      category: tpl.category,
      completed: false,
      assignee: '',
    }));
    setData((prev) => ({ ...prev, tasks: [...prev.tasks, ...newTasks] }));
    toast(TASK_TEMPLATE.length + ' Aufgaben aus Vorlage angelegt.');
  };
  const setGemaStatus = (id, status) => {
    setData((prev) => ({ ...prev, events: prev.events.map((e) => e.id === id ? { ...e, gemaStatus: status } : e) }));
    toast('GEMA-Status aktualisiert.');
  };
  const importData = (parsed) => {
    setData({
      venues: parsed.venues || [],
      artists: parsed.artists || [],
      events: parsed.events || [],
      tasks: parsed.tasks || [],
      settings: Object.assign({ onboardingDone: true }, parsed.settings),
    });
    toast('Backup eingespielt.');
  };
  const resetDemo = () => setConfirmAction({
    message: 'Alle aktuellen Daten durch die Demo-Daten ersetzen?',
    onYes: () => {
      const fresh = JSON.parse(JSON.stringify(SEED));
      fresh.settings.onboardingDone = true;
      setData(fresh);
      toast('Demo-Daten geladen.');
    },
  });
  const clearAll = () => setConfirmAction({
    message: 'Wirklich ALLE Daten unwiderruflich löschen?',
    onYes: () => {
      setData({ venues: [], artists: [], events: [], tasks: [], settings: { onboardingDone: true } });
      toast('Alle Daten gelöscht.');
    },
  });
  const onboardingDone = () => setData((prev) => ({ ...prev, settings: { ...prev.settings, onboardingDone: true } }));

  /* --- Globale Suche --- */
  const searchResults = useMemo(() => {
    const q = query.trim().toLowerCase();
    if (q.length < 2) return [];
    const res = [];
    for (const e of data.events) {
      if ((e.title + ' ' + e.subtitle).toLowerCase().includes(q)) res.push({ type: 'Event', label: e.title, sub: fmtDate(e.date), action: () => { setDetailId(e.id); } });
    }
    for (const v of data.venues) {
      if ((v.name + ' ' + v.city).toLowerCase().includes(q)) res.push({ type: 'Spielort', label: v.name, sub: v.city, action: () => go('venues') });
    }
    for (const a of data.artists) {
      if ((a.stageName + ' ' + a.contactName + ' ' + a.genres.join(' ')).toLowerCase().includes(q)) res.push({ type: 'Künstler', label: a.stageName, sub: a.genres.join(', '), action: () => go('artists') });
    }
    for (const t of data.tasks) {
      if (t.title.toLowerCase().includes(q)) res.push({ type: 'Aufgabe', label: t.title, sub: t.dueDate ? 'bis ' + fmtDate(t.dueDate) : '', action: () => go('tasks') });
    }
    return res.slice(0, 8);
  }, [query, data]);

  const openTaskCount = data.tasks.filter((t) => !t.completed).length;
  const gemaAlarmCount = data.events.filter((e) => gemaAmpel(e) === 'red').length;

  const newEventAt = (iso) => setEventForm({ date: iso });

  return html`<div class="layout">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-logo">🎭</div>
        <div>
          <div class="brand-name">Kleinkunst</div>
          <div class="brand-sub">Dashboard 2.0</div>
        </div>
      </div>
      <div class="nav-section">Planung</div>
      ${NAV.slice(0, 5).map((n) => html`
        <button key=${n.id} class="nav-item ${view === n.id ? 'active' : ''}" onClick=${() => go(n.id)}>
          <span class="ico">${n.ico}</span>${n.label}
        </button>`)}
      <div class="nav-section">Verwaltung</div>
      ${NAV.slice(5).map((n) => html`
        <button key=${n.id} class="nav-item ${view === n.id ? 'active' : ''}" onClick=${() => go(n.id)}>
          <span class="ico">${n.ico}</span>${n.label}
          ${n.id === 'tasks' && openTaskCount > 0 ? html`<span class="nav-badge">${openTaskCount}</span>` : null}
          ${n.id === 'gema' && gemaAlarmCount > 0 ? html`<span class="nav-badge">${gemaAlarmCount}</span>` : null}
        </button>`)}
      <div class="sidebar-foot">Version ${APP_VERSION} · Daten lokal gespeichert</div>
    </aside>

    <div class="main">
      <div class="topbar">
        <h1>${TITLES[view]}</h1>
        <div class="search-wrap">
          <span class="search-ico">🔍</span>
          <input placeholder="Alles durchsuchen …" value=${query} onInput=${(e) => setQuery(e.target.value)} aria-label="Globale Suche" />
          ${searchResults.length > 0 ? html`<div class="search-results">
            ${searchResults.map((r, i) => html`
              <button key=${i} class="search-result" onClick=${() => { r.action(); setQuery(''); }}>
                <div style="min-width:0;">
                  <div style="font-weight:650;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${r.label}</div>
                  ${r.sub ? html`<div style="font-size:12px;color:var(--muted);">${r.sub}</div>` : null}
                </div>
                <span class="sr-type">${r.type}</span>
              </button>`)}
          </div>` : null}
        </div>
        <button class="btn btn-primary" style="flex-shrink:0;" onClick=${() => setEventForm({})}>
          <span style="font-size:17px;line-height:1;">+</span><span class="hide-mobile"> Neue Veranstaltung</span>
        </button>
      </div>

      <div class="content">
        ${view === 'dashboard' ? html`<${DashboardView} data=${data} openEvent=${openEvent} go=${go} onNewEvent=${() => setEventForm({})} />` : null}
        ${view === 'events' ? html`<${EventsView} data=${data} openEvent=${openEvent} onNewEvent=${() => setEventForm({})} />` : null}
        ${view === 'calendar' ? html`<${CalendarView} data=${data} openEvent=${openEvent} onNewEventAt=${newEventAt} />` : null}
        ${view === 'venues' ? html`<${VenuesView} data=${data} onEdit=${(v) => setVenueForm(v)} onNew=${() => setVenueForm({})} openEvent=${openEvent} />` : null}
        ${view === 'artists' ? html`<${ArtistsView} data=${data} onEdit=${(a) => setArtistForm(a)} onNew=${() => setArtistForm({})} openEvent=${openEvent} />` : null}
        ${view === 'finance' ? html`<${FinanceView} data=${data} openEvent=${openEvent} />` : null}
        ${view === 'gema' ? html`<${GemaView} data=${data} openEvent=${openEvent} onSetGemaStatus=${setGemaStatus} />` : null}
        ${view === 'tasks' ? html`<${TasksView} data=${data} onToggleTask=${toggleTask} onDeleteTask=${deleteTask} onAddTask=${addTask} />` : null}
        ${view === 'settings' ? html`<${SettingsView} data=${data} onImport=${importData} onResetDemo=${resetDemo} onClearAll=${clearAll} toast=${toast} />` : null}
      </div>
    </div>

    <button class="fab" onClick=${() => setEventForm({})} aria-label="Neue Veranstaltung">+</button>

    <nav class="bottomnav">
      <div class="bottomnav-inner">
        ${MOBILE_NAV.map((id) => {
          const n = NAV.find((x) => x.id === id);
          return html`<button key=${id} class="bn-item ${view === id ? 'active' : ''}" onClick=${() => go(id)}>
            ${id === 'tasks' && openTaskCount > 0 ? html`<span class="bn-dot"></span>` : null}
            <span class="ico">${n.ico}</span>${n.label === 'Veranstaltungen' ? 'Events' : n.label}
          </button>`;
        })}
        <button class="bn-item ${!MOBILE_NAV.includes(view) ? 'active' : ''}" onClick=${() => setMoreOpen(true)}>
          <span class="ico">☰</span>Mehr
        </button>
      </div>
    </nav>

    ${moreOpen ? html`<${Modal} title="Weitere Bereiche" onClose=${() => setMoreOpen(false)}>
      <div class="grid" style="grid-template-columns:1fr 1fr;gap:10px;">
        ${NAV.filter((n) => !MOBILE_NAV.includes(n.id)).map((n) => html`
          <button key=${n.id} class="btn" style="justify-content:flex-start;min-height:52px;" onClick=${() => go(n.id)}>
            <span style="font-size:19px;">${n.ico}</span>${n.label}
            ${n.id === 'gema' && gemaAlarmCount > 0 ? html`<span class="nav-badge" style="margin-left:auto;">${gemaAlarmCount}</span>` : null}
          </button>`)}
      </div>
    <//>` : null}

    ${detailEvent ? html`<${EventDetail}
      event=${detailEvent} venues=${data.venues} artists=${data.artists} tasks=${data.tasks} allEvents=${data.events}
      onClose=${() => setDetailId(null)}
      onEdit=${(e) => { setDetailId(null); setEventForm(e); }}
      onDelete=${deleteEvent}
      onToggleTask=${toggleTask} onAddTask=${addTask} onDeleteTask=${deleteTask} onApplyTemplate=${applyTemplate}
    />` : null}

    ${eventForm !== null ? html`<${EventForm}
      initial=${eventForm} venues=${data.venues} artists=${data.artists} allEvents=${data.events}
      onSave=${saveEvent} onClose=${() => setEventForm(null)}
    />` : null}

    ${venueForm !== null ? html`<${VenueForm} initial=${venueForm} onSave=${saveVenue} onClose=${() => setVenueForm(null)} />` : null}
    ${artistForm !== null ? html`<${ArtistForm} initial=${artistForm} onSave=${saveArtist} onClose=${() => setArtistForm(null)} />` : null}

    ${confirmAction ? html`<${Modal} title="Bist du sicher?" onClose=${() => setConfirmAction(null)}
      footer=${html`
        <button class="btn" onClick=${() => setConfirmAction(null)}>Abbrechen</button>
        <span class="spacer"></span>
        <button class="btn btn-danger" onClick=${() => { confirmAction.onYes(); setConfirmAction(null); }}>Ja, fortfahren</button>
      `}>
      <p style="margin:0;">${confirmAction.message}</p>
    <//>` : null}

    ${!data.settings.onboardingDone ? html`<${Onboarding} onDone=${onboardingDone} />` : null}

    <${Toasts} toasts=${toasts} />
  </div>`;
}

render(html`<${App} />`, document.getElementById('app'));
</script>
</body>
</html>
